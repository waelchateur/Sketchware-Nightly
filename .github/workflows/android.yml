name: Android CI

on:
  push:
    paths:
      - '.github/workflows/android.yml'
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'public-stable-ids.txt'
      - 'settings.gradle'
    branches-ignore:
      - 'wip/**'
  workflow_dispatch:

jobs:
  build:
    name: Build APKs
    runs-on: ${{ vars.IS_USING_HOSTED_RUNNERS == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    strategy:
      matrix:
        apiLevel: [21, 26]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set environmental variables
        shell: bash
        env:
          JSON_CONTENT: ${{ secrets.GOOGLE_SERVICES_JSON }}
        if: "${{ env.JSON_CONTENT != '' }}"
        run: |
          printf 'GOOGLE_SERVICES_JSON<<EOF\n%s\nEOF\n' "$JSON_CONTENT" >> $GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false
          cache-cleanup: always

      - name: Clean Project
        run: |
          gradle --stop
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/wrapper
          rm -rf ~/.gradle/jdks
          gradle clean --refresh-dependencies

      - name: Refresh Dependencies
        run: gradle build --refresh-dependencies

      - name: Build Release APK
        env:
          SKETCHUB_API_KEY: ${{ secrets.SKETCHUB_API_KEY }}
        run: gradle assembleMinApi${{ matrix.apiLevel }}Release

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-minApi${{ matrix.apiLevel }}-release
          path: app/build/outputs/apk/minApi${{ matrix.apiLevel }}/release
